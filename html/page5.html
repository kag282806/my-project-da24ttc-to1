<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>In Bảng Cửu Chương</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; }
        .box { max-width: 300px; border: 2px solid #333; padding: 20px; border-radius: 10px; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        h3 { color: #d9534f; margin-top: 0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        #ket-qua { margin-top: 15px; line-height: 1.8; font-size: 1.1em; color: #333; }
        .dong-ke { border-bottom: 1px dashed #ccc; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="box">
        <h3>In Bảng Cửu Chương</h3>
        <label>Nhập số:</label>
        <input type="number" id="soNhap" placeholder="Nhập một số..." oninput="inCuuChuong()">
        
        <div id="ket-qua">
            </div>
    </div>

    <script>
        function inCuuChuong() {
            // 1. Lấy số từ ô input
            let n = document.getElementById("soNhap").value;
            let hienThi = document.getElementById("ket-qua");
            
            // Xóa kết quả cũ nếu ô trống
            if (n === "") {
                hienThi.innerHTML = "";
                return;
            }

            let noiDung = "";
            
            for (let i = 1; i <= 10; i++) {
                
                let ketQua = n * i;
                
                // Nối chuỗi để hiển thị dạng: 5 x 1 = 5
                noiDung += n + " x " + i + " = " + "<strong>" + ketQua + "</strong><br>";
            }

            
            hienThi.innerHTML = noiDung;
        }
    </script>

</body>
</html>
